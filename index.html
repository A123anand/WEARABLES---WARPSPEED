<!DOCTYPE html>
<html>


<head>
    <title>Warpspeed</title>
    <meta http-equiv="Content-Security-Policy">
    <!-- <script src="index.js"></script>-->
    <script src="index.js" defer></script> 
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <h1>Welcome to Warpspeed</h1>
    <p>We are a team of CU Boulder engineering students that are working on a wearable designed to help improve posture.</p>
    <p> Part of the Colorade Space Grant Consortium </p>
    
    <body style="background-color: rgb(2, 60, 17);color: #fbf6c8;">
    <input type="file" id="csvInput" accept=".csv" /> this is how we can upload a CSV file

    <!-- Tab buttons -->
    <div class="auth-tabs">
        <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username" required><br>
        <input type="password" id="password" placeholder="Password" required><br>
        <button onclick="logIn()">Login</button>


    </div>

    <!-- Sign Up Form (hidden by default) -->
    <div id="signupForm" style="display:none;">
        <h2>Sign Up</h2>
        <input type="text" id="newUsername" placeholder="Username" required><br>
        <input type="password" id="newPassword" placeholder="Password" required><br>
        <button onclick="signUp()">Sign Up</button>
    </div>


    <div id="output"></div>


</body>
</html>
